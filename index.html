
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ART IS LIFE FOUNDATION — Lewis Gitonga</title>

<meta name="description" content="Original Kenyan contemporary emotional artworks by Lewis Gitonga. One-off collector pieces available via WhatsApp.">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root{
    --bg:#ffffff;
    --text:#111;
    --accent:#b3261e;
    --deep-blue:#0b1f4b;
    --green:#1aa34a;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:Inter,sans-serif;
    background:white;
    color:var(--text);
}

/* HEADER */
header{
    padding:20px 5%;
    display:flex;
    justify-content:space-between;
    border-bottom:1px solid #eee;
    position:sticky;
    top:0;
    background:white;
    z-index:10;
}

.logo{font-weight:800;}

/* HERO */
.hero-wrapper{
    display:flex;
    height:78vh;
}

.hero-image{
    flex:7;
    background:url('cover.jpg') center/cover no-repeat;
}

.hero-text{
    flex:3;
    display:flex;
    flex-direction:column;
    justify-content:center;
    padding:40px;
    border-left:4px solid var(--deep-blue);
}

.hero-text h1{
    font-size:2.2rem;
    font-weight:900;
    color:var(--deep-blue);
}

/* GRID */
.gallery-container{
    padding:40px 5%;
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:20px;
}

@media(max-width:900px){
    .gallery-container{grid-template-columns:repeat(2,1fr);}
}

@media(max-width:600px){
    .gallery-container{grid-template-columns:1fr;}
}

/* ART CARD */
.art-card{
    border:1px solid #eee;
    background:white;
    transition:0.25s;
    position:relative;
}

.art-card:hover{
    transform:scale(1.02);
    box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.art-card img{
    width:100%;
}

/* GLITTER EFFECT */
@keyframes glitter {
    0%{opacity:1; filter:brightness(1);}
    50%{opacity:0.6; filter:brightness(1.5);}
    100%{opacity:1; filter:brightness(1);}
}

/* TAG */
.banner{
    position:absolute;
    top:10px;
    left:10px;
    font-size:0.7rem;
    font-weight:800;
    padding:5px 8px;
    border-radius:4px;
    color:white;
    background:var(--green);
    animation:glitter 1.5s infinite;
}

.art-info{padding:14px;}

.art-title{font-weight:800;color:var(--accent);}
.art-price{color:var(--accent);font-weight:800;}

.art-desc{
    font-size:0.85rem;
    color:#444;
    margin:8px 0 10px 0;
}

/* CTA */
.buy-btn{
    display:block;
    text-align:center;
    background:#25D366;
    color:white;
    padding:13px;
    font-weight:800;
    border-radius:6px;
    text-decoration:none;
    animation:glitter 1.5s infinite;
}

/* SOCIAL */
.socials{
    text-align:center;
    padding:30px;
}

.socials a{
    margin:0 10px;
    text-decoration:none;
    font-weight:700;
    color:var(--deep-blue);
}

/* FOOTER */
footer{
    text-align:center;
    padding:40px;
    background:#f9f9f9;
}
</style>
</head>

<body>

<header>
<div class="logo">ART IS LIFE FOUNDATION — Lewis Gitonga</div>
</header>

<section class="hero-wrapper">
<div class="hero-image"></div>
<div class="hero-text">
<h1>Art is emotional evidence.</h1>
<p>One-time creations. Never reproduced.</p>
</div>
</section>

<div class="gallery-container"></div>

<div class="socials">
<a href="https://instagram.com/lewis_art.is.life" target="_blank">Instagram</a>
<a href="https://facebook.com/lewis_art.is.life" target="_blank">Facebook</a>
<a href="https://wa.me/254704708178" target="_blank">WhatsApp</a>
</div>

<footer>
<p><strong>ART IS LIFE FOUNDATION — Lewis Gitonga</strong></p>
<p>© 2026 Art Is Life Foundation</p>
</footer>

<script>

const artworks = [

/* YOUR NEW WORKS FIRST */
{title:"Resonant Rhythms",price:"800 KES",image:"resonant.jpg",
desc:"A reflection on how human emotion and nature merge through sound, where creativity becomes a shared language between self and the natural world."},

{title:"Dawn of the Gentle Giant",price:"700 KES",image:"giant.jpg",
desc:"A meditation on time and inherited wisdom, with the elephant symbolizing endurance and the deep continuity between nature and human experience."},

{title:"The Sovereign Silence",price:"650 KES",image:"sovereign.jpg",
desc:"A study of identity and inner stillness, where strength and awareness coexist within the tension between nature and modern life."},

{title:"Kinship of the Canopy",price:"600 KES",image:"canopy.jpg",
desc:"A reflection on companionship in nature, where shared presence becomes a symbol of balance, recognition, and relational life."},

{title:"Solace in Grey",price:"1000 KES",image:"solace.jpg",
desc:"A moment of human connection within an isolating urban world, where warmth and unity create shelter from emotional distance."},

/* EXISTING WORKS (ADJUSTED RANGE) */
{title:"Resilience",price:"900 KES",image:"resilience.jpg",desc:"A portrait of quiet strength formed through struggle."},
{title:"Kingship & Kindness",price:"1500 KES",image:"kingship.jpg",desc:"Leadership rooted in emotional intelligence."},
{title:"Chic & Shadow",price:"1200 KES",image:"chic_shadow.jpg",desc:"Contrast between identity and depth."},
{title:"Neck to Neck",price:"1100 KES",image:"neck_to_neck.jpg",desc:"Closeness between emotional forces."},
{title:"Joyful Blooms",price:"1000 KES",image:"joyful_blooms.jpg",desc:"Renewal through color."},
{title:"Sunset Nomad",price:"1300 KES",image:"sunset_nomad.jpg",desc:"A journey of transition."},
{title:"Color of Light",price:"1400 KES",image:"color_of_light.jpg",desc:"Hope through perception."}

];

const container = document.querySelector(".gallery-container");

function whatsappLink(title, price){
const msg = `ORDER REQUEST\n\nArtwork: ${title}\nPrice: ${price}`;
return `https://wa.me/254704708178?text=${encodeURIComponent(msg)}`;
}

function render(data){
container.innerHTML = data.map(a=>`
<div class="art-card">
<div class="banner">AVAILABLE</div>
<img src="${a.image}" alt="${a.title}">
<div class="art-info">
<div class="art-title">${a.title}</div>
<div class="art-price">${a.price}</div>
<div class="art-desc">${a.desc}</div>
<a class="buy-btn" href="${whatsappLink(a.title,a.price)}" target="_blank">
Secure via WhatsApp
</a>
</div>
</div>
`).join("");
}

render(artworks);

</script>

</body>
</html>
