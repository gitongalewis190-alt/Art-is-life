firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
const storage = firebase.storage();

let currentUser = null;
let isAdmin = false;

// Listen for auth state
auth.onAuthStateChanged(user => {
  currentUser = user;
  if (user) {
    checkUserRole(user.uid);
  }
});

async function checkUserRole(uid) {
  try {
    const doc = await db.collection('users').doc(uid).get();
    isAdmin = doc.exists && doc.data().role === 'admin';
  } catch(e) { isAdmin = false; }
}

// Admin Login
function showAdminLogin() {
  document.getElementById('adminModal').classList.add('active');
  document.getElementById('adminContent').style.display = 'block';
  document.getElementById('adminPanel').style.display = 'none';
}

async function loginAdmin() {
  const email = document.getElementById('adminEmail').value;
  const pass = document.getElementById('adminPass').value;
  try {
    await auth.signInWithEmailAndPassword(email, pass);
    document.getElementById('adminContent').style.display = 'none';
    document.getElementById('adminPanel').style.display = 'block';
    document.getElementById('adminTitle').textContent = 'Admin Panel';
    showToast('✅ Admin access granted');
  } catch(e) {
    showToast('❌ Login failed: ' + e.message);
  }
}

function logoutAdmin() {
  auth.signOut();
  closeAdminModal();
  showToast('Logged out');
}

function closeAdminModal() {
  document.getElementById('adminModal').classList.remove('active');
}

// Add New Artwork (basic example — expand with form)
function addNewArtwork() {
  if (!isAdmin) return showToast('Admin only');
  const title = prompt("Artwork Title");
  const price = prompt("Price (e.g. 1200 KES)");
  const desc = prompt("Description");
  const imageUrl = prompt("Image URL (or implement upload later)");

  if (title && price) {
    db.collection('artworks').add({
      title,
      price,
      priceNum: parseInt(price),
      desc: desc || '',
      imageUrl: imageUrl || 'https://via.placeholder.com/400',
      status: 'available',
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    }).then(() => {
      showToast('Artwork added!');
      loadGallery();
    });
  }
}

// Load Gallery from Firestore (real-time)
function loadGallery() {
  const grid = document.getElementById('gallery');
  grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:40px;">Loading artworks...</div>';

  db.collection('artworks').orderBy('createdAt', 'desc').onSnapshot(snapshot => {
    let html = '';
    let count = 0;

    snapshot.forEach(doc => {
      const a = doc.data();
      count++;
      html += `
        <div class="art-card">
          <div class="art-img-wrap">
            <img src="${a.imageUrl || a.image || 'placeholder.jpg'}" alt="${a.title}" onclick="openImage('${a.imageUrl || a.image}', '${a.title}')">
            <div class="badge-available">✦ Available</div>
          </div>
          <div class="art-info">
            <div class="art-title">${a.title}</div>
            <div class="art-price">${a.price || 'Contact for price'}</div>
            <div class="art-desc">${a.desc || ''}</div>
          </div>
          <div class="art-actions">
            <button class="art-btn art-btn-order" onclick="openOrderFromFirestore('${doc.id}')">💬 Order This</button>
          </div>
        </div>`;
    });

    if (count === 0) html = '<div class="no-results"><h3>No artworks yet</h3><p>Admin can add some above.</p></div>';
    grid.innerHTML = html;
    document.getElementById('galleryCount').textContent = `${count} works`;
  });
}
