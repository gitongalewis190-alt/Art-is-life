<!-- FIREBASE RBAC MODULE -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-analytics.js";

  import {
    getAuth,
    signInWithEmailAndPassword,
    signOut,
    onAuthStateChanged
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

  import {
    getFirestore,
    doc,
    getDoc,
    collection,
    addDoc,
    updateDoc,
    deleteDoc,
    serverTimestamp
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  import {
    getStorage,
    ref,
    uploadBytesResumable,
    getDownloadURL
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

  const firebaseConfig = {
    apiKey: "AIzaSyD3EHTs5MJO1614T6VfDZF31CANhAMzQbw",
    authDomain: "artislife-44968.firebaseapp.com",
    projectId: "artislife-44968",
    storageBucket: "artislife-44968.firebasestorage.app",
    messagingSenderId: "634431592292",
    appId: "1:634431592292:web:7e88d54be7291310f74c71",
    measurementId: "G-G0NN8SHKMR"
  };

  const app = initializeApp(firebaseConfig);
  const analytics = getAnalytics(app);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const storage = getStorage(app);

  async function getUserRole(uid){
    const snap = await getDoc(doc(db,"users",uid));
    if(!snap.exists()) return null;
    return snap.data().role || null;
  }

  async function requireAdmin(user){
    if(!user) return false;
    const role = await getUserRole(user.uid);
    if(role !== "admin"){
      await signOut(auth);
      return false;
    }
    return true;
  }

  onAuthStateChanged(auth, async (user)=>{
    if(!user){
      window.isAdmin=false;
      document.getElementById('adminPanelTrigger')?.classList.remove('visible');
      return;
    }

    const isAdmin = await requireAdmin(user);

    if(isAdmin){
      window.isAdmin=true;
      document.getElementById('adminPanelTrigger')?.classList.add('visible');
      console.log("🔐 Admin verified via Firestore RBAC");
    }else{
      window.isAdmin=false;
      document.getElementById('adminPanelTrigger')?.classList.remove('visible');
    }
  });

  window.firebaseAdminLogin = async function(email,password){
    try{
      const cred = await signInWithEmailAndPassword(auth,email,password);
      const role = await getUserRole(cred.user.uid);

      if(role !== "admin"){
        await signOut(auth);
        return {success:false,error:"Access denied: Not an admin account."};
      }

      window.location.href="admin.html";
      return {success:true};
    }catch(err){
      return {success:false,error:err.message};
    }
  };

  window.firebaseAdminLogout = async function(){
    await signOut(auth);
    window.isAdmin=false;
  };

  window.saveOrderToFirestore = async function(orderData){
    await addDoc(collection(db,"orders"),{
      ...orderData,
      status:"pending",
      createdAt:serverTimestamp()
    });
  };

  window.saveLikeToFirestore = async function(artworkId){
    const user = auth.currentUser;
    if(!user) return;
    await addDoc(collection(db,"likes"),{
      userId:user.uid,
      artworkId
    });
  };

  window.uploadArtworkImage = function(file,onProgress,onComplete,onError){
    const storageRef = ref(storage,`artworks/${Date.now()}_${file.name}`);
    const uploadTask = uploadBytesResumable(storageRef,file);

    uploadTask.on("state_changed",
      snapshot=>{
        const pct = Math.round((snapshot.bytesTransferred/snapshot.totalBytes)*100);
        onProgress?.(pct);
      },
      error=>onError?.(error),
      async ()=>{
        const url = await getDownloadURL(uploadTask.snapshot.ref);
        onComplete?.(url);
      }
    );
  };

  window.adminAddArtwork = async function(artworkData){
    if(!window.isAdmin) return alert("Access denied");
    await addDoc(collection(db,"artworks"),{
      ...artworkData,
      createdAt:serverTimestamp()
    });
  };

  window.adminUpdateArtwork = async function(artId,updates){
    if(!window.isAdmin) return;
    await updateDoc(doc(db,"artworks",artId),updates);
  };

  window.adminDeleteArtwork = async function(artId){
    if(!window.isAdmin) return;
    await deleteDoc(doc(db,"artworks",artId));
  };

  console.log("🔥 Firebase initialized with FULL RBAC SECURITY");
</script>
