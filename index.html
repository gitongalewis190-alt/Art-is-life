
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ART IS LIFE FOUNDATION — Lewis Gitonga</title>

<meta name="description" content="Original Kenyan contemporary emotional artworks by Lewis Gitonga. One-off collector pieces available via WhatsApp.">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root{
    --bg:#ffffff;
    --text:#111;
    --accent:#b3261e;
    --deep-blue:#0b1f4b;
    --green:#1aa34a;
    --price-blue:#4da6ff;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:Inter,sans-serif;
    background:white;
    color:var(--text);
}

/* HEADER */
header{
    padding:20px 5%;
    display:flex;
    justify-content:space-between;
    border-bottom:1px solid #eee;
    position:sticky;
    top:0;
    background:white;
    z-index:10;
}

.logo{font-weight:800;}

/* HERO */
.hero-wrapper{
    display:flex;
    height:78vh;
}

.hero-image{
    flex:7;
    background:url('cover.jpg') center/cover no-repeat;
}

.hero-text{
    flex:3;
    display:flex;
    flex-direction:column;
    justify-content:center;
    padding:40px;
    border-left:4px solid var(--deep-blue);
}

.hero-text h1{
    font-size:2.2rem;
    font-weight:900;
    color:var(--deep-blue);
}

/* GRID */
.gallery-container{
    padding:60px 7%;
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:35px;
}

@media(max-width:900px){
    .gallery-container{grid-template-columns:repeat(2,1fr);}
}

@media(max-width:600px){
    .gallery-container{grid-template-columns:1fr;}
}

/* INTRO */
.gallery-intro-quote{
    text-align:center;
    padding:60px 20px 20px;
    font-size:1.05rem;
    color:#333;
    font-style:italic;
    max-width:750px;
    margin:0 auto;
}

.gallery-intro-quote span{
    display:block;
    margin-top:10px;
    font-weight:800;
    color:var(--deep-blue);
}

/* CARD */
.art-card{
    border:1px solid #eee;
    background:white;
    transition:0.3s ease;
    position:relative;
    border-radius:6px;
}

.art-card:hover{
    transform:translateY(-6px);
    box-shadow:0 20px 40px rgba(0,0,0,0.12);
}

.art-card img{
    width:100%;
    cursor:pointer;
}

/* ✨ ANIMATED BANNER */
@keyframes waveGlow {
    0%{transform:translateY(0); opacity:1;}
    50%{transform:translateY(-3px); opacity:0.7;}
    100%{transform:translateY(0); opacity:1;}
}

.banner{
    position:absolute;
    top:10px;
    left:10px;
    font-size:0.7rem;
    font-weight:800;
    padding:5px 8px;
    border-radius:4px;
    color:white;
    background:var(--green);
    animation:waveGlow 1.4s infinite ease-in-out;
}

/* INFO */
.art-info{padding:18px;}

.art-title{font-weight:800;color:var(--accent);}

.art-price{
    color:var(--price-blue);
    font-weight:800;
}

.art-desc{
    font-size:0.88rem;
    color:#555;
    margin:10px 0 14px;
    line-height:1.5;
}

/* CTA */
.buy-btn{
    display:block;
    text-align:center;
    background:#25D366;
    color:white;
    padding:13px;
    font-weight:800;
    border-radius:6px;
    text-decoration:none;
}

/* MODAL */
.image-modal{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.92);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:1000;
}

.image-modal img{
    max-width:90%;
    max-height:90%;
    border-radius:8px;
}

/* SOCIAL */
.socials{
    text-align:center;
    padding:40px;
}

.socials a{
    margin:0 10px;
    text-decoration:none;
    font-weight:700;
    color:var(--deep-blue);
}

/* FOOTER */
footer{
    text-align:center;
    padding:40px;
    background:#f9f9f9;
}
</style>
</head>

<body>

<header>
<div class="logo">ART IS LIFE FOUNDATION — Lewis Gitonga</div>
</header>

<section class="hero-wrapper">
<div class="hero-image"></div>
<div class="hero-text">
<h1>Art is emotional evidence.</h1>
<p>One-time creations. Rarely reproduced.</p>
</div>
</section>

<div class="gallery-intro-quote">
“Every painting is not just seen — it is experienced.”
<span>— Art Is Life Foundation</span>
</div>

<div class="gallery-container"></div>

<!-- MODAL -->
<div class="image-modal" id="imageModal">
<img id="modalImg">
</div>

<div class="socials">
<a href="https://instagram.com/lewis_art.is.life" target="_blank">Instagram</a>
<a href="https://facebook.com/lewis_art.is.life" target="_blank">Facebook</a>
<a href="https://wa.me/254704708178" target="_blank">WhatsApp</a>
</div>

<footer>
<p><strong>ART IS LIFE FOUNDATION — Lewis Gitonga</strong></p>
<p>© 2026 Art Is Life Foundation</p>
</footer>

<script>
const artworks = [

{title:"Resonant Rhythms",price:"800 KES",image:"resonant.jpg",
desc:"An exploration of the invisible dialogue between human emotion and natural rhythm, where color becomes sound and expression flows like an unspoken language between the inner self and the external world."},

{title:"Dawn of the Gentle Giant",price:"700 KES",image:"giant.jpg",
desc:"A symbolic reflection on wisdom, memory, and endurance, capturing the elephant as both a guardian of time and a mirror of humanity’s quiet strength rooted in nature."},

{title:"The Sovereign Silence",price:"650 KES",image:"sovereign.jpg",
desc:"A meditation on identity and internal stillness, revealing the powerful space where self-awareness and emotional depth exist beyond noise and distraction."},

{title:"Kinship of the Canopy",price:"600 KES",image:"canopy.jpg",
desc:"A visual narrative of connection and coexistence, where shared presence within nature reflects the deeper bonds that define human relationships and belonging."},

{title:"Solace in Grey",price:"1000 KES",image:"solace.jpg",
desc:"An intimate portrayal of warmth and unity within an isolating environment, capturing how human connection becomes refuge in emotionally distant spaces."},

{title:"Resilience",price:"900 KES",image:"resilience.jpg",
desc:"A powerful expression of strength shaped through adversity, where struggle becomes the foundation upon which identity is rebuilt and refined."},

{title:"Kingship & Kindness",price:"1500 KES",image:"kingship.jpg",
desc:"A study of leadership that transcends authority, emphasizing emotional intelligence, compassion, and the balance between power and humanity."},

{title:"Chic & Shadow",price:"1200 KES",image:"chic_shadow.jpg",
desc:"An artistic contrast between outward identity and inner depth, exploring the tension between what is presented and what is truly felt."},

{title:"Neck to Neck",price:"1100 KES",image:"neck_to_neck.jpg",
desc:"A representation of closeness, tension, and emotional proximity, where forces meet in a delicate balance of connection and intensity."},

{title:"Joyful Blooms",price:"1000 KES",image:"joyful_blooms.jpg",
desc:"A celebration of renewal and emotional awakening, where color symbolizes growth, hope, and the beauty of transformation."},

{title:"Sunset Nomad",price:"1300 KES",image:"sunset_nomad.jpg",
desc:"A journey through transition and reflection, capturing the quiet movement between endings and new beginnings."},

{title:"Color of Light",price:"1400 KES",image:"color_of_light.jpg",
desc:"An interpretation of hope and perception, where light becomes a symbol of perspective and the way we choose to see the world."}

];

const container = document.querySelector(".gallery-container");
const modal = document.getElementById("imageModal");
const modalImg = document.getElementById("modalImg");

function whatsappLink(title, price){
const msg = `ORDER REQUEST\n\nArtwork: ${title}\nPrice: ${price}`;
return `https://wa.me/254704708178?text=${encodeURIComponent(msg)}`;
}

function render(data){
let html = "";
data.forEach(a => {
html += `
<div class="art-card">
<div class="banner">AVAILABLE</div>
<img src="${a.image}" alt="${a.title}" onclick="openModal(this.src)">
<div class="art-info">
<div class="art-title">${a.title}</div>
<div class="art-price">${a.price}</div>
<div class="art-desc">${a.desc}</div>
<a class="buy-btn" href="${whatsappLink(a.title,a.price)}" target="_blank">
Secure via WhatsApp
</a>
</div>
</div>`;
});
container.innerHTML = html;
}

function openModal(src){
modal.style.display = "flex";
modalImg.src = src;
}

modal.onclick = function(){
modal.style.display = "none";
}

render(artworks);
</script>

</body>
</html>
