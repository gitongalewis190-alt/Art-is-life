<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ART IS LIFE FOUNDATION — Lewis Gitonga</title>

<!-- Firebase CDN -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
  getFirestore,
  doc,
  getDoc,
  setDoc,
  collection,
  addDoc,
  onSnapshot,
  updateDoc,
  deleteDoc,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import {
  getStorage,
  ref,
  uploadBytesResumable,
  getDownloadURL
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

/* =========================
   FIREBASE CONFIG (REQUIRED)
   ========================= */
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_AUTH_DOMAIN",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_STORAGE_BUCKET",
  messagingSenderId: "YOUR_SENDER_ID",
  appId: "YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const storage = getStorage(app);

/* =========================
   STATE
   ========================= */
let currentUser = null;
let userRole = null;
let cart = JSON.parse(localStorage.getItem("cart") || "[]");

/* =========================
   ARTWORK STRUCTURE (1:1 STORY MAP)
   ========================= */
const artworks = [
  {
    id: "1",
    title: "The Beginning — Me",
    imageUrl: "me.jpg",
    description: "Lewis Gitonga early identity",
    price: 1200,
    status: "available"
  },
  {
    id: "2",
    title: "Early Journey",
    imageUrl: "early_journey.jpg",
    description: "First steps in art and discipline",
    price: 1500,
    status: "available"
  },
  {
    id: "3",
    title: "Turning Point — Kidpreneur Summit",
    imageUrl: "elvis_teaching.jpg",
    description: "Transformation phase & exposure",
    price: 2200,
    status: "available"
  },
  {
    id: "4",
    title: "Vision Phase",
    imageUrl: "vision.jpg",
    description: "Future imagination and purpose",
    price: 2600,
    status: "available"
  },
  {
    id: "5",
    title: "Current Work",
    imageUrl: "current_work.jpg",
    description: "Present mastery and execution",
    price: 3000,
    status: "available"
  }
];

/* =========================
   ROLE CHECK
   ========================= */
async function fetchRole(uid) {
  const ref = doc(db, "users", uid);
  const snap = await getDoc(ref);
  return snap.exists() ? snap.data().role : null;
}

/* =========================
   ADMIN SECURITY
   ========================= */
function denyAccess() {
  alert("Access denied");
  closeAdmin();
}

/* =========================
   ADMIN DRAWER
   ========================= */
const adminOverlay = document.getElementById("adminOverlay");
const adminDrawer = document.getElementById("adminDrawer");

function openAdminDrawer() {
  adminOverlay.style.display = "block";
  adminDrawer.classList.add("open");
}

function closeAdmin() {
  adminOverlay.style.display = "none";
  adminDrawer.classList.remove("open");
}

/* =========================
   👑 CROWN BUTTON ALWAYS VISIBLE
   ========================= */
document.getElementById("crownBtn").addEventListener("click", async () => {
  if (!currentUser) {
    const email = prompt("Admin Email:");
    const pass = prompt("Password:");
    try {
      await signInWithEmailAndPassword(auth, email, pass);
    } catch {
      alert("Login failed");
    }
    return;
  }

  userRole = await fetchRole(currentUser.uid);

  if (userRole === "crown") {
    openAdminDrawer();
  } else {
    denyAccess();
  }
});

/* =========================
   AUTH STATE
   ========================= */
onAuthStateChanged(auth, async (user) => {
  currentUser = user;

  if (user) {
    userRole = await fetchRole(user.uid);
  }
});

/* =========================
   RENDER GALLERY
   ========================= */
function renderGallery() {
  const container = document.getElementById("gallery");
  container.innerHTML = "";

  artworks.forEach(a => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <img src="${a.imageUrl}" />
      <h3>${a.title}</h3>
      <p>${a.description}</p>
      <b>KES ${a.price}</b>
      <span class="badge">${a.status}</span>
      <button onclick="addToCart('${a.id}')">Add to Cart</button>
    `;

    container.appendChild(div);
  });
}

/* =========================
   CART SYSTEM
   ========================= */
window.addToCart = function(id) {
  const item = artworks.find(a => a.id === id);
  if (!cart.find(c => c.id === id)) {
    cart.push(item);
    localStorage.setItem("cart", JSON.stringify(cart));
    alert("Added to cart");
  }
  renderCart();
};

function renderCart() {
  const c = document.getElementById("cartItems");
  c.innerHTML = "";

  cart.forEach(i => {
    const div = document.createElement("div");
    div.innerHTML = `${i.title} - KES ${i.price}`;
    c.appendChild(div);
  });
}

/* =========================
   ORDER SYSTEM
   ========================= */
window.checkout = async function () {
  if (!cart.length) return alert("Cart empty");

  const order = {
    items: cart,
    total: cart.reduce((s, i) => s + i.price, 0),
    status: "pending",
    createdAt: serverTimestamp()
  };

  await addDoc(collection(db, "orders"), order);

  alert("Order placed");
  cart = [];
  localStorage.removeItem("cart");
  renderCart();
};

/* =========================
   INIT
   ========================= */
window.onload = () => {
  renderGallery();
  renderCart();
};

</script>

<style>
body { margin:0; font-family:Arial; background:#0b0b0b; color:white; }

header {
  display:flex;
  justify-content:space-between;
  padding:15px;
  background:#111;
  position:sticky;
  top:0;
}

#crownBtn {
  font-size:20px;
  cursor:pointer;
}

#gallery {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:10px;
  padding:10px;
}

.card {
  background:#1a1a1a;
  padding:10px;
  border-radius:10px;
}

.card img {
  width:100%;
  border-radius:10px;
}

.badge {
  display:inline-block;
  padding:3px 6px;
  background:green;
  font-size:12px;
}

button {
  margin-top:5px;
  width:100%;
  padding:8px;
  background:#ffcc00;
  border:none;
  cursor:pointer;
}

/* CART */
#cart {
  position:fixed;
  right:10px;
  bottom:10px;
  background:#222;
  padding:10px;
  border-radius:10px;
}

/* ADMIN */
#adminOverlay {
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
}

#adminDrawer {
  position:fixed;
  right:-400px;
  top:0;
  width:400px;
  height:100%;
  background:#111;
  transition:0.3s;
  padding:10px;
}

#adminDrawer.open {
  right:0;
}
</style>
</head>

<body>

<header>
  <h2>ART IS LIFE</h2>
  <div>
    🛒 Cart
    <span id="crownBtn">👑</span>
  </div>
</header>

<!-- GALLERY -->
<div id="gallery"></div>

<!-- CART -->
<div id="cart">
  <h4>Cart</h4>
  <div id="cartItems"></div>
  <button onclick="checkout()">Checkout</button>
</div>

<!-- ADMIN OVERLAY -->
<div id="adminOverlay" onclick="closeAdmin()"></div>

<!-- ADMIN DRAWER -->
<div id="adminDrawer">
  <h3>Admin Panel</h3>
  <p>Upload, Edit, Orders, Status Control</p>
  <button onclick="closeAdmin()">Close</button>
</div>

</body>
</html>
