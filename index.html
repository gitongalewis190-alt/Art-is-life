
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ART IS LIFE FOUNDATION — Lewis Gitonga</title>

<meta name="description" content="Original Kenyan contemporary emotional artworks by Lewis Gitonga. One-off collector pieces available via WhatsApp.">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root{
    --bg:#ffffff;
    --text:#111;
    --accent:#b3261e;
    --deep-blue:#0b1f4b;
    --green:#1aa34a;
    --price-blue:#4da6ff;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:Inter,sans-serif;
    background:white;
    color:var(--text);
}

/* HEADER */
header{
    padding:20px 5%;
    display:flex;
    justify-content:space-between;
    border-bottom:1px solid #eee;
    position:sticky;
    top:0;
    background:white;
    z-index:10;
}

.logo{font-weight:800;}

/* HERO */
.hero-wrapper{
    display:flex;
    height:78vh;
}

.hero-image{
    flex:7;
    background:url('cover.jpg') center/cover no-repeat;
}

.hero-text{
    flex:3;
    display:flex;
    flex-direction:column;
    justify-content:center;
    padding:40px;
    border-left:4px solid var(--deep-blue);
}

.hero-text h1{
    font-size:2.2rem;
    font-weight:900;
    color:var(--deep-blue);
}

/* INTRO */
.gallery-intro-quote{
    text-align:center;
    padding:60px 20px 20px 20px;
    font-size:1.05rem;
    color:#333;
    font-style:italic;
    max-width:750px;
    margin:0 auto;
}

.gallery-intro-quote span{
    display:block;
    margin-top:10px;
    font-weight:800;
    color:var(--deep-blue);
}

/* STORY */
.story-box{
    padding:60px 8%;
    max-width:1000px;
    margin:auto;
    border-left:4px solid var(--accent);
}

.story-box h2{
    color:var(--accent);
    margin-bottom:25px;
}

/* COLLECTION */
.collection-title{
    text-align:center;
    font-size:1.4rem;
    font-weight:900;
    margin:50px 0 20px;
    color:var(--deep-blue);
    text-decoration:underline;
}

/* GRID */
.gallery-container{
    padding:60px 7%;
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:40px;
}

@media(max-width:900px){
    .gallery-container{grid-template-columns:repeat(2,1fr);}
}

@media(max-width:600px){
    .gallery-container{grid-template-columns:1fr;}
}

/* CARD */
.art-card{
    border:1px solid #eee;
    background:white;
    transition:0.3s ease;
    position:relative;
    border-radius:6px;
}

.art-card:hover{
    transform:translateY(-6px);
    box-shadow:0 20px 40px rgba(0,0,0,0.12);
}

.art-card img{
    width:100%;
    cursor:pointer; /* 👈 shows it's clickable */
}

/* GLITTER */
@keyframes glitter {
    0%{opacity:1;}
    50%{opacity:0.6;}
    100%{opacity:1;}
}

/* TAG */
.banner{
    position:absolute;
    top:10px;
    left:10px;
    font-size:0.7rem;
    font-weight:800;
    padding:5px 8px;
    border-radius:4px;
    color:white;
    background:var(--green);
    animation:glitter 1.5s infinite;
}

/* INFO */
.art-info{padding:18px;}

.art-title{font-weight:800;color:var(--accent);}
.art-price{color:var(--price-blue);font-weight:800;}

.art-desc{
    font-size:0.85rem;
    color:#555;
    margin:10px 0 14px;
}

/* CTA */
.buy-btn{
    display:block;
    text-align:center;
    background:#25D366;
    color:white;
    padding:13px;
    font-weight:800;
    border-radius:6px;
    text-decoration:none;
    animation:glitter 1.5s infinite;
}

/* ZOOM MODAL */
.image-modal{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.9);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:1000;
}

.image-modal img{
    max-width:90%;
    max-height:90%;
    border-radius:8px;
}

/* SOCIAL */
.socials{
    text-align:center;
    padding:40px;
}

.socials a{
    margin:0 10px;
    text-decoration:none;
    font-weight:700;
    color:var(--deep-blue);
}

/* FOOTER */
footer{
    text-align:center;
    padding:40px;
    background:#f9f9f9;
}
</style>
</head>

<body>

<header>
<div class="logo">ART IS LIFE FOUNDATION — Lewis Gitonga</div>
</header>

<section class="hero-wrapper">
<div class="hero-image"></div>
<div class="hero-text">
<h1>Art is emotional evidence.</h1>
<p>One-time creations. Rarely reproduced.</p>
</div>
</section>

<div class="gallery-intro-quote">
“Every painting is not just seen — it is experienced.”
<span>— Art Is Life Foundation</span>
</div>

<div class="collection-title">THE GENERAL SERIES</div>

<div class="gallery-container"></div>

<!-- ZOOM MODAL -->
<div class="image-modal" id="imageModal">
<img id="modalImg">
</div>

<div class="socials">
<a href="https://instagram.com/lewis_art.is.life" target="_blank">Instagram</a>
<a href="https://facebook.com/lewis_art.is.life" target="_blank">Facebook</a>
<a href="https://wa.me/254704708178" target="_blank">WhatsApp</a>
</div>

<footer>
<p><strong>ART IS LIFE FOUNDATION — Lewis Gitonga</strong></p>
</footer>

<script>
const artworks = [
{title:"Resonant Rhythms",price:"800 KES",image:"resonant.jpg",desc:"Emotion and nature merge."},
{title:"Dawn of the Gentle Giant",price:"700 KES",image:"giant.jpg",desc:"Wisdom through time."},
{title:"The Sovereign Silence",price:"650 KES",image:"sovereign.jpg",desc:"Identity and stillness."},
{title:"Kinship of the Canopy",price:"600 KES",image:"canopy.jpg",desc:"Connection in nature."},
{title:"Solace in Grey",price:"1000 KES",image:"solace.jpg",desc:"Human warmth."}
];

const container = document.querySelector(".gallery-container");
const modal = document.getElementById("imageModal");
const modalImg = document.getElementById("modalImg");

function render(data){
let html = "";
data.forEach(a => {
html += `
<div class="art-card">
<div class="banner">AVAILABLE</div>
<img src="${a.image}" onclick="openModal(this.src)">
<div class="art-info">
<div class="art-title">${a.title}</div>
<div class="art-price">${a.price}</div>
<div class="art-desc">${a.desc}</div>
<a class="buy-btn" href="#" target="_blank">Secure via WhatsApp</a>
</div>
</div>`;
});
container.innerHTML = html;
}

function openModal(src){
modal.style.display = "flex";
modalImg.src = src;
}

modal.onclick = function(){
modal.style.display = "none";
}

render(artworks);
</script>

</body>
</html>
