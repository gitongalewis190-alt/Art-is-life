<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ART IS LIFE FOUNDATION — Lewis Gitonga</title>

<meta name="description" content="Original Kenyan contemporary emotional artworks by Lewis Gitonga. Collectors gallery with commissions and direct ordering.">

<!-- GOOGLE ANALYTICS -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-MPX5MMNRB2"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-MPX5MMNRB2');

function track(event, data={}){
  gtag('event', event, data);
}
</script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter,sans-serif;}

body{
  background:linear-gradient(to bottom,#fff,#f7f8fb);
  color:#111;
}

/* HEADER */
header{
  position:sticky;top:0;
  display:flex;justify-content:space-between;
  padding:14px 5%;
  background:white;
  border-bottom:1px solid #eee;
  z-index:1000;
}

/* HERO */
.hero{
  height:70vh;
  position:relative;
  overflow:hidden;
}
.hero img{
  width:100%;height:100%;
  object-fit:cover;
  animation:zoom 8s infinite alternate;
}
@keyframes zoom{
  from{transform:scale(1);}
  to{transform:scale(1.05);}
}

/* SEARCH */
.search{
  padding:20px 8%;
}
.search input{
  width:100%;
  padding:12px;
  border:1px solid #ddd;
  border-radius:6px;
}

/* BUTTONS */
.btn{
  padding:10px;
  margin-top:6px;
  border:none;
  width:100%;
  cursor:pointer;
  font-weight:700;
  border-radius:6px;
  position:relative;
  overflow:hidden;
}

/* glitter */
.btn::after{
  content:"";
  position:absolute;
  top:0;left:-100%;
  width:100%;height:100%;
  background:linear-gradient(120deg,transparent,rgba(255,255,255,0.6),transparent);
  animation:shine 2.2s infinite;
}
@keyframes shine{
  100%{left:100%;}
}

.cart-btn{background:orange;color:white;}
.order-btn{background:#25D366;color:white;}
.call-btn{background:#b3261e;color:white;}
.like-btn{background:#eee;color:#111;}

/* GRID */
.gallery{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:20px;
  padding:40px 8%;
}

.card{
  border:1px solid #eee;
  border-radius:8px;
  overflow:hidden;
  position:relative;
}

.card img{width:100%;cursor:pointer;}

.banner{
  position:absolute;
  top:8px;left:8px;
  background:linear-gradient(90deg,#1aa34a,#7dffb3,#1aa34a);
  color:white;
  padding:3px 8px;
  font-size:10px;
  animation:shine 2s infinite;
}

.heart{
  position:absolute;
  right:10px;
  top:10px;
  cursor:pointer;
  font-size:18px;
}

.info{padding:15px;}
.title{font-weight:800;}
.price{color:#4da6ff;font-weight:700;}
.desc{font-size:13px;margin:8px 0;color:#555;}

/* MODALS */
.modal{
  display:none;
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.9);
  z-index:2000;
  justify-content:center;
  align-items:center;
  padding:20px;
}
.modal-content{
  background:white;
  max-width:900px;
  width:100%;
  padding:20px;
  max-height:90vh;
  overflow:auto;
  border-radius:10px;
}

/* STORY IMAGES */
.story-img{
  width:100%;
  margin:10px 0;
  border-radius:10px;
}

/* CART */
.cartPanel{
  position:fixed;
  right:0;top:0;
  width:320px;height:100%;
  background:white;
  box-shadow:-5px 0 20px rgba(0,0,0,0.2);
  padding:15px;
  display:none;
  z-index:2000;
  overflow:auto;
}

/* COMMISSION */
.commissionBtn{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#d4af37;
  color:white;
  padding:12px 16px;
  border-radius:50px;
  font-weight:800;
  cursor:pointer;
  z-index:3000;
}

/* FOOTER */
footer{
  text-align:center;
  padding:20px;
  font-size:12px;
  color:#777;
}

@media(max-width:900px){
  .gallery{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<header>
<div>ART IS LIFE FOUNDATION</div>
<div>🛒 <span id="cartCount">0</span></div>
</header>

<!-- HERO -->
<section class="hero">
<img src="cover.jpg">
</section>

<!-- SEARCH -->
<div class="search">
<input id="search" placeholder="Search artworks...">
</div>

<!-- GALLERY -->
<div class="gallery" id="gallery"></div>

<!-- CART -->
<div class="cartPanel" id="cartPanel">
<h3>Your Cart</h3>
<div id="cartItems"></div>
<button class="btn order-btn" onclick="checkout()">Proceed to Order</button>
<button class="btn" onclick="closeCart()">Close</button>
</div>

<!-- STORY MODAL -->
<div class="modal" id="storyModal">
<div class="modal-content">
<h2>MY UNTOLD STORY & VISION</h2>

<img class="story-img" src="story1.jpg">
<img class="story-img" src="story2.jpg">
<img class="story-img" src="story3.jpg">
<img class="story-img" src="story4.jpg">
<img class="story-img" src="story5.jpg">

<p>Full immersive story content goes here... your full narrative preserved.</p>

<button class="btn" onclick="closeStory()">Close</button>
</div>
</div>

<!-- COMMISSION BUTTON -->
<div class="commissionBtn" onclick="openCommission()">🎨 Commission</div>

<!-- COMMISSION MODAL -->
<div class="modal" id="commissionModal">
<div class="modal-content">
<h2>Create Commission</h2>

<input id="cname" placeholder="Name"><br><br>
<textarea id="cdesc" placeholder="Describe your vision"></textarea><br><br>

<button class="btn order-btn" onclick="sendCommission()">Send</button>
<button class="btn" onclick="closeCommission()">Close</button>
</div>
</div>

<!-- FOOTER -->
<footer>
© 2026 ART IS LIFE FOUNDATION — Lewis Gitonga
</footer>

<script>

const artworks=[
{title:"Resonant Rhythms",price:"800 KES",image:"resonant.jpg",desc:"Emotional frequency"},
{title:"Dawn Giant",price:"700 KES",image:"giant.jpg",desc:"Strength"},
{title:"Silence",price:"650 KES",image:"sovereign.jpg",desc:"Stillness"},
{title:"Canopy",price:"600 KES",image:"canopy.jpg",desc:"Nature"},
{title:"Solace",price:"1000 KES",image:"solace.jpg",desc:"Peace"},
{title:"Resilience",price:"900 KES",image:"resilience.jpg",desc:"Power"},
{title:"Kingship",price:"1500 KES",image:"kingship.jpg",desc:"Leadership"},
{title:"Shadow",price:"1200 KES",image:"chic_shadow.jpg",desc:"Duality"},
{title:"Balance",price:"1100 KES",image:"neck_to_neck.jpg",desc:"Harmony"},
{title:"Bloom",price:"1000 KES",image:"joyful_blooms.jpg",desc:"Growth"},
{title:"Sunset",price:"1300 KES",image:"sunset_nomad.jpg",desc:"Change"},
{title:"Light",price:"1400 KES",image:"color_of_light.jpg",desc:"Hope"}
];

let cart=[];

function render(filter=""){
document.getElementById("gallery").innerHTML=
artworks.filter(a=>
(a.title+a.desc).toLowerCase().includes(filter.toLowerCase())
).map((a,i)=>`

<div class="card">

<div class="banner">AVAILABLE</div>

<div class="heart" onclick="like(${i})">❤️</div>

<img src="${a.image}" onclick="openStory()">

<div class="info">
<div class="title">${a.title}</div>
<div class="price">${a.price}</div>
<div class="desc">${a.desc}</div>

<button class="btn cart-btn" onclick="addCart(${i})">Add to Cart</button>
<button class="btn order-btn" onclick="order(${i})">Order</button>
<button class="btn call-btn" onclick="location='tel:0704708188'">Call</button>

</div>

</div>

`).join("");
}

render();

document.getElementById("search").oninput=(e)=>render(e.target.value);

function addCart(i){
cart.push(artworks[i]);
document.getElementById("cartCount").innerText=cart.length;
alert("Added to cart");
}

function openCart(){
document.getElementById("cartPanel").style.display="block";
document.getElementById("cartItems").innerHTML=
cart.map(a=>`<p>${a.title} - ${a.price}</p>`).join("");
}

function closeCart(){
document.getElementById("cartPanel").style.display="none";
}

function checkout(){
let name=prompt("Name");
let address=prompt("Address");

let msg=cart.map(a=>a.title+" "+a.price).join("\n");

window.open("https://wa.me/254704708178?text="+encodeURIComponent(
`Hello I'm ${name}\n\n${msg}\n\n${address}`
));
}

function order(i){
let name=prompt("Name");
let address=prompt("Address");

window.open("https://wa.me/254704708178?text="+encodeURIComponent(
`Order: ${artworks[i].title}\n${address}`
));
}

function openStory(){
document.getElementById("storyModal").style.display="flex";
}

function closeStory(){
document.getElementById("storyModal").style.display="none";
}

function openCommission(){
document.getElementById("commissionModal").style.display="flex";
}

function closeCommission(){
document.getElementById("commissionModal").style.display="none";
}

function sendCommission(){
let name=document.getElementById("cname").value;
let desc=document.getElementById("cdesc").value;

window.open("https://wa.me/254704708178?text="+encodeURIComponent(
`Commission from ${name}\n${desc}`
));
}

</script>

</body>
</html>
